<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Confirmed · haloe</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A040;
    --gold-light: #DBB85A;
    --black: #000;
    --cream: #F5F0E8;
    --t2: #A1A1A6;
    --t3: #6E6E73;
    --s1: #1C1C1E;
    --s3: #3A3A3C;
    --sep: rgba(255,255,255,0.10);
    --sep2: rgba(255,255,255,0.16);
  }
  html { font-size: 78%; }
  body {
    background: var(--black);
    color: var(--cream);
    font-family: 'Poppins', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.25rem 3rem;
  }
  main { width: 100%; max-width: 440px; }

  .tick {
    width: 46px; height: 46px; border-radius: 50%;
    background: rgba(201,160,64,0.14);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1rem;
  }
  .tick svg {
    width: 22px; height: 22px;
    stroke: var(--gold); fill: none;
    stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
  }
  h1 {
    font-size: 1.85rem; font-weight: 500;
    letter-spacing: -0.03em; line-height: 1.12;
    text-align: center;
  }
  .sub {
    color: var(--t2); font-size: 0.86rem; line-height: 1.6;
    text-align: center; margin-top: 0.35rem;
  }

  .group {
    background: var(--s1); border-radius: 12px;
    overflow: hidden; margin-top: 1.3rem;
  }
  .next {
    display: flex; gap: 0.85rem;
    padding: 0.75rem 0.85rem;
    border-bottom: 1px solid var(--sep);
  }
  .next:last-child { border-bottom: none; }
  .num {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--s3); color: var(--cream);
    font-size: 0.62rem; font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    flex: none; margin-top: 0.1rem;
  }
  .next.now .num { background: var(--gold); color: #000; }
  .next p { font-size: 0.82rem; line-height: 1.5; }
  .next p span {
    display: block; color: var(--t3);
    font-size: 0.74rem; margin-top: 0.12rem;
  }

  .cta {
    display: block; width: 100%; text-align: center;
    background: var(--gold); color: #000;
    text-decoration: none; font-weight: 500; font-size: 0.85rem;
    padding: 0.75rem; border-radius: 999px;
    margin-top: 1.1rem;
    transition: background 0.2s;
  }
  .cta:hover { background: var(--gold-light); }
  .quiet {
    display: block; text-align: center;
    color: var(--t2); text-decoration: none;
    font-size: 0.8rem; margin-top: 1rem;
    transition: color 0.2s;
  }
  .quiet:hover { color: var(--cream); }
</style>
</head>
<body>

<main>
  <div class="tick" aria-hidden="true">
    <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
  </div>
  <h1>You&rsquo;re booked.</h1>
  <p class="sub" id="payment-sub"></p>

  <div class="group">
    <div class="next now">
      <span class="num">1</span>
      <p>Complete your health intake form
        <span>Takes a few minutes, and Halima needs it before your appointment.</span>
      </p>
    </div>
    <div class="next">
      <span class="num">2</span>
      <p>Halima will be in touch
        <span>To confirm the details, and your travel cost if you&rsquo;re outside the city centre.</span>
      </p>
    </div>
    <div class="next">
      <span class="num">3</span>
      <p>On the day
        <span id="balance-note">She comes to you.</span>
      </p>
    </div>
  </div>

  <a class="cta" href="/intake">Complete your intake form</a>
  <a class="quiet" href="index.html">Back to haloe</a>
</main>

<script>
  const params = new URLSearchParams(window.location.search);
  const type      = params.get('type');
  const treatment = params.get('treatment') || '';
  const date      = params.get('date')      || '';
  const time      = params.get('time')      || '';
  const amount    = parseInt(params.get('amount') || '0', 10);

  // Derived from the amount actually charged — never hard-code the deposit,
  // or a £1 test booking reports itself as £25.
  const paid = '£' + (amount / 100).toFixed(2).replace(/\.00$/, '');

  const bits = [treatment, [date, time].filter(Boolean).join(', ')].filter(Boolean);
  bits.push(type === 'deposit' ? `${paid} deposit paid` : `Paid in full — ${paid}`);
  document.getElementById('payment-sub').textContent = bits.join(' · ');

  if (type === 'deposit') {
    document.getElementById('balance-note').textContent =
      'She comes to you. The remaining balance is payable on the day.';
  }

  // The address was only ever held for the old WhatsApp hand-off, which has gone.
  // Clear it rather than leave a home address sitting in storage.
  try { sessionStorage.removeItem('haloe_address'); } catch (e) {}
</script>

</body>
</html>
