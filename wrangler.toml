# Cloudflare configuration for the haloe Pages project.
#
# IMPORTANT: This Pages project deploys via Git integration with its build
# "Root directory" set to website-and-booking/. Cloudflare's build therefore does
# NOT read this repo-root file, and it does not change how the site deploys.
#
# The D1 binding below documents the database and is used by local tooling
# (e.g. `npx wrangler d1 execute haloe-clients ...`). For the LIVE site's
# Functions to reach the database via `context.env.DB`, the same binding
# (variable name: DB) MUST also be added in the Cloudflare dashboard:
#   Pages → haloe → Settings → Functions → D1 database bindings.

name = "haloe"

[[d1_databases]]
binding = "DB"
database_name = "haloe-clients"
database_id = "d83b88f8-bd59-4c68-859a-eb91af649336"
